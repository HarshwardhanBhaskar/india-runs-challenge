ai_usage_summary: |
  Used Gemini via the Antigravity AI Agent for collaborative architecture design, code creation, honeypot scanning, and debugging. No candidate data was shared with external API endpoints during execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A multi-tier candidate discovery pipeline with programmatic honeypot filters (rejecting expert-zero and company-year mismatches). Computes composite scores across five major vectors: Title relevance (35%), Experience target match (5-9 years, 20%), Deep skill scoring including endorsements/duration (25%), Location/relocation fit (10%), and Recruiter activity/engagement metrics (10%). Incorporates explicit tie-breakers (ascending candidate_id) and generates customized, hallucination-free summaries of qualifications.

